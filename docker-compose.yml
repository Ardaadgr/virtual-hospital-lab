# Sanal Hastane - gelistirme bagimliliklari.
# .NET API'leri lokalde (dotnet run) calisir; yalnizca bagimliliklar konteynerdedir.
#
# UYARI: Buradaki parolalar YALNIZCA yerel gelistirme icindir.
# Uretimde ortam degiskeni veya secret manager kullanilir.

services:
  postgres:
    image: postgres:16
    container_name: vh-postgres
    environment:
      POSTGRES_USER: vhadmin
      POSTGRES_PASSWORD: local_dev_only
      POSTGRES_DB: virtualhospital
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/db/init-schemas.sql:/docker-entrypoint-initdb.d/01-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vhadmin -d virtualhospital"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: vh-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: vhadmin
      RABBITMQ_DEFAULT_PASS: local_dev_only
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: vh-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: local_dev_only
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/virtualhospital
      KC_DB_USERNAME: vhadmin
      KC_DB_PASSWORD: local_dev_only
      KC_DB_SCHEMA: keycloak
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: vh-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vhadmin
      MINIO_ROOT_PASSWORD: local_dev_only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  orthanc:
    image: orthancteam/orthanc:latest
    container_name: vh-orthanc
    environment:
      ORTHANC__NAME: VirtualHospitalVNA
      ORTHANC__AUTHENTICATION_ENABLED: "true"
      ORTHANC__REGISTERED_USERS: |
        {"vhadmin": "local_dev_only"}
      DICOM_WEB_PLUGIN_ENABLED: "true"
    ports:
      - "8042:8042"
      - "4242:4242"
    volumes:
      - orthancdata:/var/lib/orthanc/db

volumes:
  pgdata:
  miniodata:
  orthancdata:
